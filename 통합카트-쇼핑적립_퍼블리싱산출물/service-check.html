<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <title>서비스 점검</title>
  <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
  <!-- style -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="wrap">
    <!-- service check -->
    <div class="page-service-check">
      <i class="ico-service-check"></i>
      <p class="title">더 좋은 서비스를 제공하기 위해<br>점검을 하고 있어요</p>
      <p class="text">이용에 불편을 드려 죄송합니다<br>더 좋은 서비스로 금방 돌아올게요!</p>
      <div class="date-box">
        <p class="title">점검기간</p>
        <p class="text">12.24(수) 00:00 ~ 06:00 (6시간)</p>
      </div>
      <div class="btn-box">
        <button class="btn blue" type="button">확인</button>
      </div>
    </div>
  </div>
  <script src="./js/common.js"></script>
</body>
</html>
